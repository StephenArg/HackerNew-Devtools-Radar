services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hn-devtools-radar-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hn_devtools_radar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hn_devtools_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
